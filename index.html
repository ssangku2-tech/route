<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1b2a">
<title>My Route</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#0d1b2a; --bg2:#13263c; --card:#172b44; --card2:#1d3553;
  --ink:#eaf2fb; --ink-dim:#9fb4ce; --ink-faint:#62789a;
  --line:#274463; --accent:#ffd166; --accent2:#5fd0c4;
  --go:#5fd0c4; --back:#ff9f7a;
  --r:16px; --shadow:0 6px 24px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  min-height:100vh;
  padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 16px);
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:460px;margin:0 auto;padding:0 16px}

/* header */
header{padding:22px 4px 14px}
.eyebrow{font-size:12px;letter-spacing:.18em;color:var(--ink-faint);font-weight:700;text-transform:uppercase}
h1{font-size:26px;margin:4px 0 2px;font-weight:800;letter-spacing:-.02em}
.origin{font-size:13px;color:var(--ink-dim);display:flex;align-items:center;gap:6px}
.origin .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none}
.now{font-size:12px;color:var(--ink-faint);margin-top:6px}

/* dest cards */
.dests{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.dcard{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden;
  transition:border-color .2s;
}
.dcard.active{border-color:var(--accent)}
.dcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.dname{font-size:17px;font-weight:700;letter-spacing:-.01em}
.daddr{font-size:12px;color:var(--ink-faint);margin-top:3px;line-height:1.4}
.dirbtn{
  flex:none;border:1px solid var(--line);background:var(--card2);color:var(--ink-dim);
  border-radius:10px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s;
}
.dirbtn:active{transform:scale(.95)}
.dirbtn.go{color:var(--go);border-color:rgba(95,208,196,.4)}
.dirbtn.back{color:var(--back);border-color:rgba(255,159,122,.4)}
.dirbtn svg{width:13px;height:13px}

.routes{margin-top:14px;display:flex;flex-direction:column;gap:10px}
.route{
  background:var(--card2);border-radius:12px;padding:13px 14px;
  border:1px solid transparent;
}
.route-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.route-tag{font-size:11px;font-weight:700;color:var(--ink-faint);letter-spacing:.05em}
.route-time{font-size:20px;font-weight:800;letter-spacing:-.02em}
.route-time small{font-size:12px;font-weight:600;color:var(--ink-dim);margin-left:3px}
.route-meta{font-size:11px;color:var(--ink-faint);text-align:right;margin-top:2px}

/* segment bar */
.segbar{display:flex;height:30px;border-radius:8px;overflow:hidden;gap:2px;margin-bottom:9px}
.seg{display:flex;align-items:center;justify-content:center;gap:4px;font-size:11px;font-weight:700;color:#0d1b2a;min-width:24px;padding:0 6px;overflow:hidden;white-space:nowrap}
.seg.walk{background:#3a5573;color:var(--ink-dim);font-weight:600}
.seg .ic{font-size:11px}

/* segment detail list */
.seglist{display:flex;flex-direction:column;gap:0;border-left:2px solid var(--line);margin-left:6px;padding-left:0}
.step{display:flex;gap:10px;padding:5px 0 5px 12px;position:relative;font-size:12.5px;line-height:1.45}
.step::before{content:'';position:absolute;left:-7px;top:9px;width:10px;height:10px;border-radius:50%;background:var(--line);border:2px solid var(--card2)}
.step.sub::before{background:var(--accent2)}
.step.bus::before{background:var(--back)}
.step .lbl{font-weight:700}
.step .sub2{color:var(--ink-faint);font-size:11px}

.state{padding:18px 4px;text-align:center;color:var(--ink-dim);font-size:13px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}

/* add destination */
.adder{margin-top:20px}
.add-row{display:flex;gap:8px}
.add-row input{
  flex:1;background:var(--card);border:1px solid var(--line);color:var(--ink);
  border-radius:12px;padding:13px 14px;font-size:15px;outline:none;
}
.add-row input::placeholder{color:var(--ink-faint)}
.add-row input:focus{border-color:var(--accent)}
.add-row button{
  flex:none;background:var(--accent);color:#0d1b2a;border:0;border-radius:12px;
  padding:0 18px;font-size:15px;font-weight:800;cursor:pointer;
}
.add-row button:active{transform:scale(.97)}
.add-hint{font-size:11px;color:var(--ink-faint);margin-top:7px;padding-left:4px}
.searchres{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.sr{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
.sr:active{background:var(--card2)}
.sr .srn{font-size:14px;font-weight:600}
.sr .sra{font-size:11px;color:var(--ink-faint);margin-top:2px}
.sr .add{color:var(--accent);font-size:20px;font-weight:300;flex:none}

.rm{margin-left:8px;color:var(--ink-faint);font-size:11px;cursor:pointer;background:none;border:0;padding:4px}
.refresh{background:none;border:1px solid var(--line);color:var(--ink-dim);border-radius:9px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin:18px 4px 4px}
.foot{text-align:center;color:var(--ink-faint);font-size:10.5px;margin-top:24px;line-height:1.6}
.err{color:#ff9f7a}
.keybox{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px}
.keybox input{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:11px;font-size:13px;margin-top:8px;outline:none}
.keybox button{margin-top:10px;background:var(--accent);color:#0d1b2a;border:0;border-radius:9px;padding:10px 16px;font-weight:700;cursor:pointer;font-size:13px}
.keybox p{margin:0;font-size:12px;color:var(--ink-dim);line-height:1.5}
.keybox a{color:var(--accent2)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">집 ↔ 목적지 · 실시간 대중교통</div>
    <h1>My Route</h1>
    <div class="origin"><span class="dot"></span><span id="originLabel">은빛마을 612동 · 화정</span></div>
    <div class="now" id="nowLabel"></div>
  </header>

  <div id="keyArea"></div>

  <div class="dests" id="dests"></div>

  <div class="adder">
    <div class="toolbar">
      <span class="route-tag">목적지 추가</span>
      <button class="refresh" id="refreshAll">↻ 전체 새로고침</button>
    </div>
    <div class="add-row">
      <input id="q" placeholder="식당·건물·주소로 검색" autocomplete="off">
      <button id="searchBtn">검색</button>
    </div>
    <div class="add-hint">예: "성수 어니언", "롯데월드타워", "강남역 11번 출구"</div>
    <div class="searchres" id="searchres"></div>
  </div>

  <div class="foot">
    실시간 정보는 조회 시점 기준입니다 · 도보 구간은 가능한 한 역까지 직접 이동<br>
    경로 데이터: ODsay · 지명 검색: Kakao
  </div>
</div>

<script>
/* ========= 설정 ========= */
// Cloudflare Worker 프록시 주소 (아래 worker.js 배포 후 여기에 입력)
// [경로] ODsay URI 키 — lab.odsay.com 에서 플랫폼 "URI"로 발급한 키.
//   등록 URI: https://ssangku2-tech.github.io
//   URI 방식은 등록 도메인에서만 호출이 허용되므로 키가 노출돼도 타 도메인에선 못 씀.
const ODSAY_KEY = "4Qj7VeyluYFOt8mYtv27MA";

// [지명검색] Kakao 검색은 Worker 프록시 경유(키 숨김). 검색 안 쓰면 비워둬도 됨.
const PROXY = "https://route-search.ssangku2.workers.dev";

const ORIGIN = { name:"집 (은빛마을 612동)", x:126.8364, y:37.6417 };

// 기본 목적지 2개. 추가 목적지는 localStorage 대신 메모리/Firebase 확장 가능
const DEFAULT_DESTS = [
  { id:"ace",  name:"에이스테크노타워 5차", addr:"서울 구로구 디지털로31길 20", x:126.8943, y:37.4855 },
  { id:"misa", name:"미사랑데르 III",      addr:"경기 하남시 미사강변남로 103", x:127.1933, y:37.5611 },
];

/* ========= 상태 ========= */
let dests = DEFAULT_DESTS.map(d => ({...d, dir:"go", routes:null, loading:false, error:null}));
// dir: "go" = 집→목적지(출근),  "back" = 목적지→집(퇴근)

/* ========= 유틸 ========= */
const $ = s => document.querySelector(s);
const TRAFFIC = { 1:{ic:"🚇",cls:"sub"}, 2:{ic:"🚌",cls:"bus"}, 3:{ic:"🚶",cls:"walk"} };
const SUBWAY_COLOR = {
  "1":"#0052A4","2":"#00A84D","3":"#EF7C1C","4":"#00A5DE","5":"#996CAC",
  "6":"#CD7C2F","7":"#747F00","8":"#E6186C","9":"#BDB092","수인분당":"#FABE00",
  "신분당":"#D4003B","경의중앙":"#77C4A3","공항":"#0090D2","경춘":"#0C8E72",
  "우이신설":"#B7C452","서해":"#8FC31F","김포골드":"#A17800","GTX-A":"#9A6292"
};
function fmtMin(m){ if(m>=60){const h=Math.floor(m/60);return h+"시간 "+(m%60)+"분";} return m+"분"; }
function subColor(name){
  if(!name) return "#888";
  for(const k in SUBWAY_COLOR){ if(name.includes(k)) return SUBWAY_COLOR[k]; }
  return "#5fd0c4";
}
function laneName(seg){
  if(seg.lane && seg.lane[0]){
    return seg.lane[0].name || seg.lane[0].busNo || "";
  }
  return "";
}

/* ========= 렌더 ========= */
function renderNow(){
  const d = new Date();
  const days=["일","월","화","수","목","금","토"];
  $("#nowLabel").textContent =
    `조회: ${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]}) ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")} 기준`;
}

function renderDests(){
  const root = $("#dests");
  root.innerHTML = "";
  dests.forEach((d,i)=>{
    const card = document.createElement("div");
    card.className = "dcard";
    const goingTo = d.dir==="go";
    const dirLabel = goingTo ? "출근 · 집→목적지" : "퇴근 · 목적지→집";
    const fromLabel = goingTo ? ORIGIN.name : d.name;
    const toLabel   = goingTo ? d.name : "집 (은빛마을)";

    card.innerHTML = `
      <div class="dcard-top">
        <div>
          <div class="dname">${d.name}${d.custom?`<button class="rm" data-rm="${i}">삭제</button>`:""}</div>
          <div class="daddr">${dirLabel} · ${fromLabel} → ${toLabel}</div>
        </div>
        <button class="dirbtn ${d.dir}" data-flip="${i}">
          ${goingTo?arrow():arrowBack()} ${goingTo?"출근":"퇴근"}
        </button>
      </div>
      <div class="routes" id="r${i}"></div>
    `;
    root.appendChild(card);
    renderRoutes(i);
  });

  root.querySelectorAll("[data-flip]").forEach(b=>{
    b.onclick = ()=>{ const i=+b.dataset.flip; dests[i].dir = dests[i].dir==="go"?"back":"go"; dests[i].routes=null; renderDests(); loadRoute(i); };
  });
  root.querySelectorAll("[data-rm]").forEach(b=>{
    b.onclick = ()=>{ dests.splice(+b.dataset.rm,1); renderDests(); };
  });
}

function arrow(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';}
function arrowBack(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>';}

function renderRoutes(i){
  const el = $("#r"+i);
  if(!el) return;
  const d = dests[i];
  if(d.loading){ el.innerHTML = `<div class="state"><span class="spin"></span>실시간 경로 조회 중…</div>`; return; }
  if(d.error){ el.innerHTML = `<div class="state err">${d.error}</div>`; return; }
  if(!d.routes){ el.innerHTML = ""; return; }
  if(d.routes.length===0){ el.innerHTML = `<div class="state">경로를 찾지 못했어요</div>`; return; }

  el.innerHTML = d.routes.map((r,idx)=>routeHTML(r, idx===0)).join("");
}

function routeHTML(r, isBest){
  // segment bar
  const total = r.info.totalTime;
  const bar = r.subPath.filter(s=>s.trafficType!==3 || (s.sectionTime||0)>0).map(s=>{
    const t = TRAFFIC[s.trafficType] || TRAFFIC[3];
    const w = Math.max((s.sectionTime/total)*100, 8);
    if(s.trafficType===3){
      return `<div class="seg walk" style="flex:${w}"><span class="ic">🚶</span>${s.sectionTime||""}</div>`;
    }
    const nm = laneName(s);
    const bg = s.trafficType===1 ? subColor(nm) : "#ff9f7a";
    const label = s.trafficType===1 ? (nm.replace("수도권","").replace("호선","").trim()||"") : (nm||"버스");
    return `<div class="seg" style="flex:${w};background:${bg};color:#fff"><span class="ic">${t.ic}</span>${label}</div>`;
  }).join("");

  // step list
  const steps = r.subPath.map(s=>{
    if(s.trafficType===3){
      if(!s.sectionTime) return "";
      return `<div class="step"><div><span class="lbl">도보</span> ${s.sectionTime}분 <span class="sub2">${s.distance?`(${s.distance}m)`:""}</span></div></div>`;
    }
    if(s.trafficType===1){
      const nm = laneName(s);
      return `<div class="step sub"><div><span class="lbl" style="color:${subColor(nm)}">${nm}</span> ${s.sectionTime}분<br><span class="sub2">${s.startName} → ${s.endName} · ${s.stationCount}개역</span></div></div>`;
    }
    const nm = laneName(s);
    return `<div class="step bus"><div><span class="lbl" style="color:var(--back)">${nm} 버스</span> ${s.sectionTime}분<br><span class="sub2">${s.startName} → ${s.endName} · ${s.stationCount}정류장</span></div></div>`;
  }).filter(Boolean).join("");

  const transfers = (r.info.busTransitCount||0)+(r.info.subwayTransitCount||0);
  return `
    <div class="route">
      <div class="route-head">
        <span class="route-tag">${isBest?"⚡ 최단 · 방법 1":"방법 2"}</span>
        <div>
          <div class="route-time">${fmtMin(total)}</div>
          <div class="route-meta">환승 ${transfers>1?transfers-1:0}회 · 도보 ${r.info.totalWalk}m · ${r.info.payment?r.info.payment.toLocaleString()+"원":""}</div>
        </div>
      </div>
      <div class="segbar">${bar}</div>
      <div class="seglist">${steps}</div>
    </div>`;
}

/* ========= API ========= */
async function loadRoute(i){
  const d = dests[i];
  d.loading = true; d.error = null; d.routes = null; renderRoutes(i);

  const goingTo = d.dir==="go";
  const sx = goingTo ? ORIGIN.x : d.x;
  const sy = goingTo ? ORIGIN.y : d.y;
  const ex = goingTo ? d.x : ORIGIN.x;
  const ey = goingTo ? d.y : ORIGIN.y;

  try{
    const url = "https://api.odsay.com/v1/api/searchPubTransPathT"
      + `?SX=${sx}&SY=${sy}&EX=${ex}&EY=${ey}`
      + `&SearchType=0&SearchPathType=0&OPT=0`
      + `&apiKey=${encodeURIComponent(ODSAY_KEY)}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    if(data.error || (data.result && data.result.error)){
      throw new Error((data.result&&data.result.msg) || (data.error&&data.error.msg) || data.error || "API 오류");
    }
    let paths = (data.result && data.result.path) || [];
    // 지하철 우선: 지하철 포함 경로를 위로, 없으면 버스. 시간순 정렬.
    paths.sort((a,b)=>{
      const aSub = a.subPath.some(s=>s.trafficType===1)?0:1;
      const bSub = b.subPath.some(s=>s.trafficType===1)?0:1;
      if(aSub!==bSub) return aSub-bSub;
      return a.info.totalTime - b.info.totalTime;
    });
    d.routes = paths.slice(0,2);
  }catch(e){
    d.error = "조회 실패: "+e.message+" (ODsay 키·등록 도메인 확인)";
  }finally{
    d.loading = false; renderRoutes(i);
  }
}

function loadAll(){ dests.forEach((_,i)=>loadRoute(i)); }

/* ========= 목적지 검색 (Kakao keyword via proxy) ========= */
async function searchPlace(q){
  const box = $("#searchres");
  if(PROXY.includes("YOUR-SUBDOMAIN")){
    box.innerHTML = `<div class="state">목적지 검색을 쓰려면 Kakao 검색용 Worker 프록시 설정이 필요해요 (README 참고)</div>`;
    return;
  }
  box.innerHTML = `<div class="state"><span class="spin"></span>검색 중…</div>`;
  try{
    const res = await fetch(`${PROXY}/search?q=${encodeURIComponent(q)}`);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    const list = data.documents || [];
    if(!list.length){ box.innerHTML = `<div class="state">검색 결과가 없어요</div>`; return; }
    box.innerHTML = list.slice(0,6).map((p,idx)=>`
      <div class="sr" data-idx="${idx}">
        <div>
          <div class="srn">${p.place_name}</div>
          <div class="sra">${p.road_address_name||p.address_name||""}</div>
        </div>
        <span class="add">＋</span>
      </div>`).join("");
    box.querySelectorAll(".sr").forEach(el=>{
      el.onclick = ()=>{
        const p = list[+el.dataset.idx];
        dests.push({
          id:"c"+Date.now(), name:p.place_name,
          addr:p.road_address_name||p.address_name||"",
          x:parseFloat(p.x), y:parseFloat(p.y),
          dir:"go", routes:null, loading:false, error:null, custom:true
        });
        box.innerHTML = ""; $("#q").value="";
        renderDests(); loadRoute(dests.length-1);
        window.scrollTo({top:0,behavior:"smooth"});
      };
    });
  }catch(e){
    box.innerHTML = `<div class="state err">검색 실패: ${e.message}</div>`;
  }
}

/* ========= 설정 안내 ========= */
function checkSetup(){
  if(ODSAY_KEY.includes("YOUR_ODSAY")){
    $("#keyArea").innerHTML = `
      <div class="keybox">
        <p><b>⚙️ 설정 필요</b><br>
        경로 조회를 쓰려면 ODsay <b>URI</b> 키가 필요합니다.
        <a href="https://lab.odsay.com" target="_blank">lab.odsay.com</a>에서
        플랫폼 <b>URI</b>로 앱을 등록(등록 URI: 본인 GitHub Pages 주소)하고,
        발급된 키를 <code>index.html</code> 상단의 <code>ODSAY_KEY</code>에 넣어주세요.</p>
      </div>`;
    return false;
  }
  return true;
}

/* ========= 초기화 ========= */
renderNow();
renderDests();
if(checkSetup()) loadAll();

$("#searchBtn").onclick = ()=>{ const q=$("#q").value.trim(); if(q) searchPlace(q); };
$("#q").addEventListener("keydown",e=>{ if(e.key==="Enter"){const q=$("#q").value.trim(); if(q) searchPlace(q);} });
$("#refreshAll").onclick = ()=>{ renderNow(); if(checkSetup()) loadAll(); };
